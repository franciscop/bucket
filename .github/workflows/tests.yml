name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint, mocked suites, signer oracles, and FileSystem, plus B2 live when the
  # Backblaze secrets are set. The bundle is built via the `prepare` hook during
  # `bun install`, so a build failure fails this job too. No Docker required.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies (also builds via prepare)
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test --timeout 30000
        env:
          CI: true
          B2_BUCKET: ${{ secrets.BACKBLAZE_NAME }}
          B2_APPLICATION_KEY_ID: ${{ secrets.BACKBLAZE_ID }}
          B2_APPLICATION_KEY: ${{ secrets.BACKBLAZE_KEY }}

  # Full integration suite for S3, R2, GCS and Azure against local emulators.
  # No cloud credentials needed; MinIO and Azurite verify request signatures.
  emulators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Start emulators (MinIO, Azurite, fake-gcs-server)
        run: docker compose -f docker-compose.emulators.yml up -d
      - name: Create buckets and container
        run: bun run emulators:setup
      - name: Run integration suite against emulators
        run: bun --env-file=.env.emulators test test/index.test.ts --timeout 30000
